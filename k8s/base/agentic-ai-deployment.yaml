apiVersion: apps/v1
kind: Deployment
metadata:
  name: wealthwise-agentic-ai
  namespace: wealthwise
  labels:
    app.kubernetes.io/name: wealthwise-agentic-ai
    app.kubernetes.io/component: agentic-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wealthwise-agentic-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wealthwise-agentic-ai
        app.kubernetes.io/component: agentic-ai
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agentic-ai
          image: wealthwise-agentic-ai:latest
          ports:
            - containerPort: 5200
              protocol: TCP
          envFrom:
            - configMapRef:
                name: wealthwise-config
            - secretRef:
                name: wealthwise-secrets
          env:
            - name: AGENT_PORT
              value: "5200"
            - name: MCP_SERVER_URL
              value: "http://wealthwise-mcp:5100"
          livenessProbe:
            httpGet:
              path: /health
              port: 5200
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5200
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfied: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: wealthwise-agentic-ai
