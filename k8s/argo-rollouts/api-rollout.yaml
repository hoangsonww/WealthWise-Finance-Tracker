# Argo Rollouts — API Canary Rollout
#
# Replaces apps/v1/Deployment (wealthwise-api) in the production namespace.
# Strategy: Canary with pod-count-based traffic splitting.
#
# Traffic progression:
#   10% canary → 2m pause → analysis → 30% → 5m pause → 60% → 5m pause → 100%
#
# Background analysis runs Prometheus queries throughout; a single metric failure
# triggers an automatic rollback to the previous stable ReplicaSet.
#
# Usage:
#   # Remove the base Deployment first, then apply this Rollout:
#   kubectl delete deployment wealthwise-api -n wealthwise-production
#   kubectl apply -f api-services.yaml  -n wealthwise-production
#   kubectl apply -f api-rollout.yaml   -n wealthwise-production
#
#   # Trigger an update:
#   kubectl argo rollouts set image wealthwise-api \
#     api=ghcr.io/hoangsonww/wealthwise-api:<new-sha> \
#     -n wealthwise-production
#
#   # Watch the rollout live:
#   kubectl argo rollouts get rollout wealthwise-api -n wealthwise-production --watch
#
#   # Manually promote (if paused waiting for approval):
#   kubectl argo rollouts promote wealthwise-api -n wealthwise-production
#
#   # Abort and rollback:
#   kubectl argo rollouts abort wealthwise-api -n wealthwise-production
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: wealthwise-api
  namespace: wealthwise-production
  labels:
    app.kubernetes.io/name: wealthwise-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: wealthwise
    app.kubernetes.io/managed-by: argo-rollouts
  annotations:
    rollouts.argoproj.io/revision: "1"
spec:
  replicas: 3
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app.kubernetes.io/name: wealthwise-api

  # ── Canary Strategy ────────────────────────────────────────────────────────
  strategy:
    canary:
      # Stable and canary services must be applied before this Rollout.
      # Argo Rollouts manages the selector on these services automatically.
      stableService: wealthwise-api-stable
      canaryService: wealthwise-api-canary

      # Max unavailable pods during rollout (0 = rolling, never below replica count)
      maxUnavailable: 0
      maxSurge: 1

      # Background analysis — runs throughout the rollout from step 2 onwards.
      # A single failure triggers automatic rollback.
      analysis:
        startingStep: 2
        templates:
          - templateName: wealthwise-success-rate
        args:
          - name: service-name
            value: wealthwise-api-canary
          - name: namespace
            value: wealthwise-production

      steps:
        # Step 1 — Route 10% of traffic to canary pods
        - setWeight: 10

        # Step 2 — Allow canary to stabilise (2 minutes)
        - pause:
            duration: 2m

        # Step 3 — Increase to 30%; background analysis is now running
        - setWeight: 30

        # Step 4 — Extended soak at 30% (5 minutes)
        - pause:
            duration: 5m

        # Step 5 — Majority canary (60%)
        - setWeight: 60

        # Step 6 — Final soak before full promotion
        - pause:
            duration: 5m

        # Step 7 — Full canary (100%); stable pods will scale down after promotion
        - setWeight: 100

  # ── Pod Template ───────────────────────────────────────────────────────────
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wealthwise-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: wealthwise
      annotations:
        # Force rolling restart when ConfigMap or Secret changes
        checksum/config: "{{ include (print .Template.BasePath \"/configmap.yaml\") . | sha256sum }}"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 30

      containers:
        - name: api
          # Update this image tag via CI/CD:
          #   kubectl argo rollouts set image wealthwise-api \
          #     api=ghcr.io/hoangsonww/wealthwise-api:<sha>
          image: ghcr.io/hoangsonww/wealthwise-api:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 4000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: wealthwise-config
            - secretRef:
                name: wealthwise-secrets

          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /api/health
              port: 4000
            failureThreshold: 10
            periodSeconds: 5

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfied: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: wealthwise-api
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfied: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: wealthwise-api
