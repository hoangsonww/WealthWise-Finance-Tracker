apiVersion: apps/v1
kind: Deployment
metadata:
  name: wealthwise-agentic-ai
  namespace: wealthwise
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: agentic-ai
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
